<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guided tour | viz</title>
<!-- Guided, narrated walkthrough of the 40 concept demos in curriculum order.
     STATIC shell (no module imports) so it opens over file:// or http, like
     index.html. The embedded demo PREVIEW is an <iframe> of each live demo,
     which (like every demo) needs http to run its ES modules:
       python3 -m http.server 8099 --directory viz
       open http://localhost:8099/tour.html
     Over file:// the shell + narration render but the preview pane is blank
     (use the "open full demo" link, or serve over http). -->
<style>
  :root{--ink:#1a1d21;--blue:#1f6feb;--line:#e3e6ea}
  *{box-sizing:border-box}
  body{font:15px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);margin:0;background:#fff}
  header{padding:14px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:5}
  h1{font-size:18px;margin:0 0 8px}
  h1 small{font-weight:400;color:#586069;font-size:13px}
  .prog{height:7px;background:#eef1f4;border-radius:4px;overflow:hidden}
  .prog > i{display:block;height:100%;background:linear-gradient(90deg,#1f6feb,#3b82f6);width:0;transition:width .2s}
  .wrap{display:flex;gap:0;align-items:flex-start}
  nav.rail{flex:0 0 250px;border-right:1px solid var(--line);padding:12px 10px;height:calc(100vh - 60px);overflow:auto;position:sticky;top:60px}
  .fam{font:12px ui-monospace,monospace;color:#586069;font-weight:700;margin:12px 4px 4px;text-transform:uppercase;letter-spacing:.04em}
  .rail a{display:flex;gap:7px;align-items:center;padding:3px 8px;border-radius:6px;color:#24292e;text-decoration:none;font-size:13px;cursor:pointer}
  .rail a:hover{background:#f3f4f6}
  .rail a.on{background:#eaf2ff;color:#1f6feb;font-weight:600}
  .rail a .dot{width:14px;color:#9aa4ad;font-size:11px;text-align:center}
  .rail a.seen .dot{color:#2ca02c}
  main{flex:1 1 auto;min-width:0;padding:18px 24px 40px}
  .stopmeta{font:12px ui-monospace,monospace;color:#8a939b}
  .faintro{background:#f6f8ff;border:1px solid #d9e4f7;border-radius:8px;padding:11px 14px;margin:8px 0 14px;color:#33414f;font-size:14px}
  h2{font-size:21px;margin:6px 0 4px}
  .why{font-size:15.5px;color:#2a2f35;margin:0 0 12px;max-width:70ch}
  .frame{width:100%;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fafbfc}
  iframe{width:100%;height:560px;border:0;display:block}
  .links{margin:10px 0 18px;font-size:14px}
  .links a{color:#1f6feb;text-decoration:none;border:1px solid #d7e3f4;background:#f3f8ff;border-radius:6px;padding:3px 11px;margin-right:8px}
  .links a:hover{background:#e3efff}
  .nextline{color:#586069;font-size:13px;margin:6px 0 14px}
  .ctl{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  button{font:14px system-ui;cursor:pointer;background:#fff;border:1px solid #d0d7de;border-radius:7px;padding:6px 14px;color:#24292e}
  button:hover:not(:disabled){background:#f3f4f6}
  button:disabled{color:#c4c9ce;cursor:default}
  button.primary{background:#1f6feb;color:#fff;border-color:#1f6feb}
  button.primary:hover{background:#1a5fd0}
  .kbd{font:11px ui-monospace,monospace;color:#8a939b;margin-left:auto}
  @media(max-width:820px){nav.rail{display:none}}
</style>
</head>
<body>
<header>
  <h1>Guided tour <small>— the math of a language model, in order. <a href="index.html" style="color:#1f6feb">grid view →</a></small></h1>
  <div class="prog"><i id="bar"></i></div>
</header>
<div class="wrap">
  <nav class="rail" id="rail"></nav>
  <main>
    <div class="stopmeta" id="meta"></div>
    <div class="faintro" id="faintro" style="display:none"></div>
    <h2 id="title"></h2>
    <p class="why" id="why"></p>
    <div class="frame"><iframe id="frame" title="demo preview" loading="lazy"></iframe></div>
    <div class="links" id="links"></div>
    <div class="nextline" id="nextline"></div>
    <div class="ctl">
      <button id="prev">‹ Prev</button>
      <button id="next" class="primary">Next ›</button>
      <span class="kbd">← / → to move · this preview needs http to run</span>
    </div>
  </main>
</div>
<script>
// Curriculum order + plain-language narration (mirrors framework/order.js +
// index.html; the tour adds the connective prose).
const FAM = {
  A:['Foundational primitives','Before any "AI", it is linear algebra. These atoms — multiply, dot-product, number formats, softmax — are what every later mechanism is built from.'],
  B:['Attention','Attention is how tokens look at each other. We build it up from the Q/K/V views to the full formula, then the tricks that make it fast and the patterns that emerge.'],
  C:['Transformer block','Now assemble a full block — embeddings, the feed-forward layer, norms, the residual highway, the output head — and see the two phases of inference.'],
  D:['Mixture of Experts','Make the feed-forward layer sparse: route each token to a few specialist experts instead of all of them, and keep them evenly used.'],
  E:['Non-transformer sequences','Attention is not the only option. State-space models and linear attention scan a sequence with a running state — sub-quadratic rivals, often hybridised with attention.'],
  F:['CNN / vision','How models see images: the sliding convolution, growing receptive fields, pooling, the edges→textures→parts hierarchy, and the bridge into transformers.'],
  G:['Quantization & multimodal','The deployment reality: shrink the weights to int4, budget the VRAM, and feed images/audio into a text model as tokens.'],
  H:['End to end & training','Put every piece together: one prompt flowing through the whole pipeline to predict the next word — and then the backward pass that lets it learn.'],
  I:['Real-model grounding','Everything so far ran real math on synthetic (seeded) weights. Now ground it: fetch a real trained model in the browser and watch its real numbers show the same structure.'],
};
const STOPS = [
  ['A','matmul','Every layer of every model is, underneath, matrix multiplication — the dot product of rows and columns. Start here.'],
  ['A','dot-product','The single number that says "how aligned are these two vectors?" — the heartbeat of attention and similarity.'],
  ['A','dtype-bits','fp32 / fp16 / int8 / int4: how a number is stored bit by bit, and why low precision shrinks models so much.'],
  ['A','softmax','Turns a list of scores into probabilities that sum to 1 — used inside attention and to pick the next word.'],
  ['B','qkv-projection','Each token makes a Query, a Key, and a Value — three different "views" of itself for attention to use.'],
  ['B','scaled-dot-attention','The core formula: compare every Query to every Key, softmax, and mix the Values. This is "attention".'],
  ['B','multi-head','Run attention several times in parallel, each head learning a different relationship, then combine them.'],
  ['B','gqa-mqa','Share Keys/Values across heads to shrink the memory cost of generation — the GQA trick in modern models.'],
  ['B','causal-mask','Stop a token from peeking at the future, so the model can be trained to predict the next word.'],
  ['B','attention-patterns','What real attention looks like: induction heads, previous-token heads, the diagonal — the shapes that emerge.'],
  ['B','kv-cache','Why generation is fast: cache every past token\'s Keys/Values so each new word is cheap. The headline mechanism.'],
  ['B','rope','How position is encoded by rotating vectors — so "the cat" differs from "cat the" — and how it extends context.'],
  ['B','flash-attention','The same attention, computed tile-by-tile so it never stores the giant scores matrix — the speed/memory win.'],
  ['C','tokenization','Before the model sees text, Byte-Pair Encoding turns it into integer token IDs — merging the most frequent character pairs to build a vocabulary.'],
  ['C','embedding','Words ⇄ vectors: the lookup table that turns token IDs into the model\'s first representation.'],
  ['C','mlp-gated','The per-token feed-forward layer (SwiGLU) — where most of a model\'s parameters and "knowledge" live.'],
  ['C','activations','ReLU / GELU / SiLU: the nonlinearities that let a network learn more than a straight line.'],
  ['C','normalization','LayerNorm / RMSNorm: keep activations well-scaled so deep networks train stably.'],
  ['C','residual-stream','The shared "highway" every block reads from and writes back to — the backbone of a transformer.'],
  ['C','lm-head','The final projection from the hidden state to a score for every word in the vocabulary.'],
  ['C','transformer-block','Assemble it: attention + MLP + norms + residuals = one block, stacked N times.'],
  ['C','prefill-vs-decode','The two phases of inference: process the whole prompt in parallel, then generate one token at a time.'],
  ['C','sampling','Greedy / temperature / top-k / top-p: how the next word is actually chosen from the probabilities.'],
  ['D','moe-routing','Mixture of Experts: a router sends each token to a few specialist sub-networks instead of all of them.'],
  ['D','moe-balance','Keeping the experts evenly used (load balancing) so none are wasted or overloaded.'],
  ['E','ssm-scan','State-space models: an alternative to attention that scans the sequence with a running state (Mamba\'s core).'],
  ['E','mamba-block','The full Mamba block — selective state + projections — a sub-quadratic rival to the transformer.'],
  ['E','gated-deltanet','Linear attention as a fast-updating memory matrix — the GatedDeltaNet update rule.'],
  ['E','hybrid-by-layer','Interleave cheap SSM layers with occasional full attention — the modern hybrid recipe.'],
  ['F','convolution','The sliding kernel of CNNs: a small filter swept over an image, summing products at each spot.'],
  ['F','receptive-field','How stacking convolutions lets deep neurons "see" a larger and larger area of the input.'],
  ['F','pooling','Downsampling — max/average over a window — to shrink feature maps and add invariance.'],
  ['F','feature-maps','What a CNN actually sees at each depth: edges → textures → parts.'],
  ['F','batchnorm','Normalizing activations during training, and the frozen running stats used at inference.'],
  ['F','residual-block','The ResNet skip connection — why adding the input back lets 100+ layer nets train at all.'],
  ['F','depthwise-separable','MobileNet\'s trick: split a convolution into cheap parts to cut the compute ~8–9×.'],
  ['F','patch-embedding','How a Vision Transformer turns an image into tokens — the CNN→transformer bridge.'],
  ['G','quantization','Squeezing fp16 weights into int4 (with a per-group scale) — how big models fit in small memory.'],
  ['G','vram-budget','The arithmetic of "will it fit?": weights + KV cache + activations vs your GPU.'],
  ['G','multimodal-inject','How a photo or audio clip enters a text model — encode it into tokens and splice them in.'],
  ['H','forward-pass','Everything at once: a prompt flowing through the whole pipeline to predict the next word. The capstone.'],
  ['H','backprop','The backward pass: how the model learns. Gradients flow back by the chain rule; descend them and the loss falls to 0. That loop is training.'],
  ['I','real-embeddings','The payoff: a real trained model, fetched and run in your browser. Type words and watch real cosine-similarity and a real semantic map — the structure the synthetic pages illustrated is genuinely in the weights.'],
  ['I','real-attention','Real GPT-2, running in your browser: we fetch the weights and run a verified forward to capture every head\'s attention. Hunt the head-map for the induction, previous-token, and attention-sink heads the synthetic pages only sketched.'],
  ['I','real-logits','The same real GPT-2 forward, finished — ln_f + the tied lm_head turn the last hidden state into a real next-token distribution. Type a prefix, see what the model actually predicts, and reshape it with temperature / top-k / top-p like a real sampler.'],
  ['I','logit-lens','Peek inside: apply that same lm_head to EVERY layer, not just the last, and watch the prediction form with depth — early layers echo the input, the answer locks in near the top. The "logit lens".'],
  ['I','real-quant','Deployment reality, on real numbers: range-fetch one actual GPT-2 weight tensor and watch it get quantized to int4. Real weights are a tight bell curve with a few outliers, so per-group scales + a few more bits crush the error — why int4/int8 work.'],
  ['I','real-generate','The finale: a real GPT-2 writing text in your browser. Generation is just the next-token step fed back in a loop — logits, sample, append, repeat. Greedy is deterministic (and verified token-for-token vs the reference); turn it off to sample creatively.'],
];
const N = STOPS.length;
const seen = new Set(JSON.parse(localStorage.getItem('vz-tour-seen') || '[]'));
let idx = 0;
const q = new URLSearchParams(location.search);
if (q.has('stop')) idx = Math.max(0, Math.min(N - 1, (+q.get('stop')) - 1));
else if (location.hash) idx = Math.max(0, Math.min(N - 1, (+location.hash.slice(1)) - 1 || 0));

const $ = (id) => document.getElementById(id);
// build rail
let rail = '', curFam = '';
STOPS.forEach(([f, slug], i) => {
  if (f !== curFam) { rail += `<div class="fam">${f} · ${FAM[f][0]}</div>`; curFam = f; }
  rail += `<a data-i="${i}" id="rl${i}"><span class="dot">${i + 1}</span><span>${slug}</span></a>`;
});
$('rail').innerHTML = rail;
$('rail').addEventListener('click', (e) => { const a = e.target.closest('a'); if (a) go(+a.dataset.i); });

function render() {
  const [f, slug, why] = STOPS[idx];
  const prevFam = idx > 0 ? STOPS[idx - 1][0] : null;
  $('meta').textContent = `Stop ${idx + 1} of ${N}  ·  Family ${f} — ${FAM[f][0]}`;
  if (f !== prevFam) { $('faintro').style.display = 'block'; $('faintro').textContent = FAM[f][1]; }
  else $('faintro').style.display = 'none';
  $('title').textContent = slug;
  $('why').textContent = why;
  $('frame').src = `./${slug}/index.html`;
  $('links').innerHTML = `<a href="./${slug}/index.html" target="_blank">open full demo ↗</a><a href="./${slug}/README.md" target="_blank">read the notes</a>`;
  const nxt = idx < N - 1 ? STOPS[idx + 1] : null;
  $('nextline').textContent = nxt ? `Next up — ${nxt[1]}: ${nxt[2]}` : 'That\'s the whole tour — you\'ve seen the full pipeline end to end.';
  $('prev').disabled = idx === 0;
  $('next').textContent = idx < N - 1 ? 'Next ›' : '↺ Restart';
  $('bar').style.width = ((idx + 1) / N * 100) + '%';
  seen.add(idx); localStorage.setItem('vz-tour-seen', JSON.stringify([...seen]));
  document.querySelectorAll('.rail a').forEach((a) => { const i = +a.dataset.i; a.classList.toggle('on', i === idx); a.classList.toggle('seen', seen.has(i)); if (seen.has(i) && i !== idx) a.querySelector('.dot').textContent = '✓'; });
  history.replaceState(null, '', location.pathname + '?stop=' + (idx + 1));
  const on = $('rl' + idx); if (on) on.scrollIntoView({ block: 'nearest' });
}
function go(i) { idx = Math.max(0, Math.min(N - 1, i)); render(); }
$('prev').onclick = () => go(idx - 1);
$('next').onclick = () => go(idx < N - 1 ? idx + 1 : 0);
document.addEventListener('keydown', (e) => { if (e.target.tagName === 'INPUT') return; if (e.key === 'ArrowLeft') go(idx - 1); else if (e.key === 'ArrowRight') go(idx + 1); });
render();
</script>
</body>
</html>
